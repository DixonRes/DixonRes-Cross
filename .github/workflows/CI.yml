name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Windows: cross-compile from Linux via MinGW-w64
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            cmake make

      - name: Configure (CMake, MinGW cross-compile)
        run: |
          cmake -B build-win \
            -DCMAKE_TOOLCHAIN_FILE="$(pwd)/cmake/toolchain-mingw64.cmake" \
            -DDIXONRES_USE_BUNDLED_DEPS=OFF

      - name: Build
        run: cmake --build build-win -j$(nproc)

      - name: Verify executables exist
        run: |
          echo "=== build-win layout ==="
          find build-win -name "*.exe" -o -name "*.dll" | sort
          test -f build-win/dixon.exe || test -f build-win/bin/dixon_cli_real.exe
          echo "OK: Windows build succeeded"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dixon-windows-x86_64
          path: |
            build-win/dixon.exe
            build-win/dixon_win_gui.exe
            build-win/bin/dixon_cli_real.exe
            build-win/dll/
            build-win/lib/libdixon-1.a
            build-win/lib/libdixon-1.dll.a
          retention-days: 30
